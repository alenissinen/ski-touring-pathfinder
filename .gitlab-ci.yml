image: maven:3.9.6-eclipse-temurin-21

stages:
  - test
  - pages

test:
  stage: test
  script:
    - mvn test
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml

pages:
  stage: pages
  script:
    - mvn clean package javadoc:javadoc -Dshow=private -DskipTests
    - mkdir public
    - cp -r docs/apidocs/* public/
  artifacts:
    paths:
      - public
